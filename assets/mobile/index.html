<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>莎温路书 - 旅行计划生成器</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="welcome-gate-open">
  <!-- 欢迎页 -->
  <div id="page0" class="app-page active-page welcome-gate" aria-label="莎温路书欢迎页">
    <div class="welcome-luxury-card">
      <svg class="welcome-brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="60" height="70" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M 50,26 C 62,26 62,40 50,46 C 38,52 38,64 50,68 L 50,102" stroke-width="3.5" />
        <path d="M 30,48 C 32,68 40,78 44,78 C 48,78 49,71 50,68 C 51,71 52,78 56,78 C 60,78 68,68 70,48" stroke-width="3.5" />
      </svg>
      <h1 class="welcome-brand-title">莎温<span>路书</span></h1>
      <div class="welcome-brand-subtitle">VINEYARD NOTE</div>
      <p class="welcome-copy">
        "旷野的风，已经替你吹过了远方。<br>
        留一页空白，让我们在这里，<br>
        写下专属于你的美妙旅程。"
      </p>
      <button id="btn-start-journey" class="welcome-start-btn" type="button">
        开启您的美妙行程 ➔
      </button>
    </div>
  </div>

  <!-- 主容器 -->
  <main class="container">
    <!-- 品牌头部 -->
    <div class="brand-header-container">
      <div class="brand-top-row">
        <svg class="brand-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="45" height="50" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); flex-shrink: 0;" aria-hidden="true">
          <path d="M 50,22 C 64,22 64,38 51,40 C 38,42 38,55 50,57 C 62,59 62,73 50,76 L 50,88" stroke-width="3.2" />
          <path d="M 26,40 C 28,62 38,72 44,72 C 48,72 49,61 50,54 C 51,61 52,72 56,72 C 62,72 72,62 74,40" />
          <path d="M 50,88 C 50,94 45,98 42,100" stroke-width="1.5" opacity="0.8" />
        </svg>
        <h1 class="brand-title">
          <span class="brand-name-highlight">莎温</span><span class="brand-name-secondary">路书</span>
        </h1>
      </div>
      <div class="brand-subtitle">VINEYARD NOTE</div>
    </div>

    <!-- 页面1: 基础信息 -->
    <div id="page1" class="page active">
      <form id="basicForm">
        <label>出发地 <span class="required">*</span>
          <input id="departure" name="departure" placeholder="点击选择或手动输入 (如: 西安)" readonly>
        </label>
        <label>目的地 <span class="required">*</span>
          <input id="destInput" name="destination" placeholder="点击选择或手动输入 (如: 云南/昆明)">
        </label>
        <label>出行日期 <span class="required">*</span>
          <div class="date-range">
            <input id="startDate" type="date" required>
            <span>-</span>
            <input id="endDate" type="date" required>
          </div>
        </label>
        <label>同行人数（纯数字）
          <input id="groupSize" type="number" min="1" placeholder="1" value="1">
        </label>
        <div class="actions">
          <button id="nextBtn" type="button" class="primary">下一步</button>
        </div>
        <div id="historyPanel" class="history-panel"></div>
      </form>
    </div>

    <!-- 页面2: 行程段编辑 -->
    <div id="page2" class="page">
      <div class="page-header">
        <button id="backBtn" type="button" class="back-btn">← 返回修改</button>
        <h2>细节微调 - 按行程段编辑</h2>
      </div>
      <div id="segmentContainer" class="daily-scroll"></div>
      <div class="segment-actions">
        <button id="addSegmentBtn" type="button">＋ 新增行程段</button>
      </div>
      <div class="actions page2-actions">
        <button id="generateImageBtn" type="button" class="primary">一键生成计划图</button>
        <button id="toPage3Btn" type="button">进入动态出行看板</button>
      </div>
    </div>

    <!-- 页面3: 动态出行看板 -->
    <div id="page3" class="hidden-page">
      <div class="page-header">
        <button id="backToPage2Btn" type="button" class="back-btn">← 返回上一页</button>
        <h2>行中随身动态行程看板</h2>
      </div>
      <div class="swiper-container" id="page3Swiper">
        <div class="swiper-wrapper" id="page3Slides"></div>
      </div>
      <div class="swiper-dots" id="swiperDots"></div>
      <template id="currencySelectTemplate">
        <select id="currencySelect" class="currency-select" aria-label="切换记账币种">
          <option value="CNY" selected>CNY (￥)</option>
          <option value="THB">THB (฿)</option>
          <option value="JPY">JPY (¥)</option>
          <option value="KRW">KRW (₩)</option>
          <option value="SGD">SGD ($)</option>
          <option value="MYR">MYR (RM)</option>
          <option value="VND">VND (₫)</option>
          <option value="EUR">EUR (€)</option>
          <option value="GBP">GBP (£)</option>
          <option value="USD">USD ($)</option>
          <option value="AUD">AUD ($)</option>
        </select>
      </template>
    </div>

    <!-- 城市选择弹窗 -->
    <div id="cityModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <button id="cityModalClose" type="button" class="close-btn">✕</button>
          <h3 id="cityModalTitle">选择出发地</h3>
        </div>
        <div class="modal-search">
          <input id="citySearch" class="search-input" type="text" placeholder="搜索城市 / 拼音，回车确认">
          <div id="searchResults" class="search-results"></div>
        </div>
        <div class="modal-tabs">
          <button class="tab-btn active" data-tab="domestic">国内·港澳台</button>
          <button class="tab-btn" data-tab="international">国际城市</button>
        </div>
        <div class="modal-body">
          <div id="domesticTab" class="tab-content active">
            <div class="history-section">
              <h4>历史搜索</h4>
              <div id="historyList" class="city-list"></div>
            </div>
            <div class="hotcities-section">
              <h4>热门城市推荐</h4>
              <div id="hotCities" class="city-list"></div>
            </div>
            <div class="province-city-section">
              <div class="province-list" id="provinceList"></div>
              <div class="city-picker-list" id="cityPickerList"></div>
            </div>
          </div>
          <div id="internationalTab" class="tab-content">
            <div class="history-section">
              <h4>历史搜索</h4>
              <div id="historyListIntl" class="city-list"></div>
            </div>
            <div class="hotcities-section">
              <h4>热门城市推荐</h4>
              <div id="hotCitiesIntl" class="city-list"></div>
            </div>
            <div class="region-country-section">
              <div class="region-list" id="regionList"></div>
              <div class="country-city-section">
                <div class="country-list" id="countryList"></div>
                <div class="city-picker-list" id="cityPickerListIntl"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section id="result" class="result">
      <h2>生成结果</h2>
      <pre id="output">（结果将在此显示）</pre>
    </section>
  </main>

  <!-- 图片预览弹窗 -->
  <div id="previewModal" class="hidden-modal">
    <div class="preview-modal-panel">
      <div class="preview-image-stage">
        <button id="closeModalBtn" type="button" class="preview-close-btn">×</button>
        <img id="planPreviewImg" alt="旅行计划图预览">
      </div>
      <div class="preview-modal-actions">
        <button id="saveImgBtn" type="button">保存图片</button>
        <button id="shareImgBtn" type="button">分享行程</button>
      </div>
    </div>
  </div>

  <!-- AI加载弹窗 -->
  <div id="aiLoadingModal" class="ai-loading-modal hidden-modal">
    <div class="ai-loading-card">
      <div class="ai-loading-orbit"></div>
      <div class="ai-loading-title">✨ 正在进入动态出行看板...</div>
      <div class="ai-loading-subtitle">正在整理行程信息，请稍候</div>
    </div>
  </div>

  <!-- 手机端海报弹窗 -->
  <div id="mobilePosterModal" class="hidden-modal">
    <div class="mobile-poster-panel">
      <button class="mobile-poster-close" id="mobilePosterCloseBtn">关闭预览</button>
      <div class="mobile-poster-tip">💡 长按图片可保存至相册，也可分享给好友</div>
      <div class="mobile-poster-image-wrap" id="mobilePosterImageWrap"></div>
    </div>
  </div>

  <script src="cities-data.js"></script>
  <script src="planner.js"></script>
  <script src="app.js"></script>
</body>
</html>
